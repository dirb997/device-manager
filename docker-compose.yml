services:
  db:
    image: postgres:16-alpine
    container_name: device-manager-db
    environment:
      POSTGRES_DB: device_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d device_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: device-manager-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/device_manager
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: